<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | CRM 2025</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg: #f8fafc; 
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }

        .auth-card { 
            background: white; 
            padding: 45px 40px; 
            border-radius: 28px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid var(--border); 
        }

        .brand-icon { 
            width: 54px; height: 54px; 
            background: var(--primary); 
            color: white; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 24px; 
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .form-label { 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #475569; 
            margin-bottom: 8px;
        }

        .form-control { 
            border-radius: 12px; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            background: #fcfdfe;
            transition: all 0.2s ease;
        }

        .form-control:focus { 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
            border-color: var(--primary); 
            background: #fff;
        }

        .social-btn { 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            padding: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            color: #1e293b; 
            font-weight: 600; 
            text-decoration: none; 
            transition: 0.3s;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .social-btn:hover { 
            background: #f8fafc; 
            border-color: #cbd5e1;
            color: #000;
        }

        .btn-primary { 
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700; 
            background: var(--primary); 
            border: none; 
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .divider {
            position: relative;
            text-align: center;
            margin-bottom: 25px;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            z-index: 1;
        }
        .divider span {
            background: #fff;
            padding: 0 15px;
            color: #94a3b8;
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }

        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .login-section {
            border-top: 1px solid var(--border);
            margin-top: 30px;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-icon">
        <i class="fas fa-bolt"></i>
    </div>
    
    <h3 class="fw-bold text-dark mb-1">Get Started</h3>
    <p class="text-muted small mb-4">Create your account to start managing campaigns.</p>

    <a href="#" class="social-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
        Continue with Google
    </a>

    <div class="divider">
        <span>or use email</span>
    </div>

    <form action="/signup" method="POST">
        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control" placeholder="John" required>
            </div>
            <div class="col-6">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
        </div>
        
        <div class="mb-4">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small text-muted" for="terms">
                    I agree to the <a href="#" class="text-primary text-decoration-none fw-bold">Terms & Conditions</a>
                </label>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary w-100 shadow-sm">
            Create Account <i class="fas fa-rocket ms-2 small"></i>
        </button>
    </form>

    <div class="login-section text-center">
        <p class="small text-muted mb-0">
            Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Sign In</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
