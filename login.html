<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | CRM 2025</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg: #f8fafc; 
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .auth-card { 
            background: white; 
            padding: 45px 40px; 
            border-radius: 28px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid var(--border); 
        }

        .brand-icon { 
            width: 54px; height: 54px; 
            background: var(--primary); 
            color: white; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 24px; 
            font-size: 24px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .form-label { 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #475569; 
            margin-bottom: 8px;
        }

        .form-control { 
            border-radius: 12px; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            background: #fcfdfe;
            transition: all 0.2s ease;
        }

        .form-control:focus { 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
            border-color: var(--primary); 
            background: #fff;
        }

        .btn-primary { 
            border-radius: 12px; 
            padding: 14px; 
            font-weight: 700; 
            background: var(--primary); 
            border: none; 
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .forgot-link {
            transition: 0.2s;
        }
        
        .forgot-link:hover {
            color: var(--primary-hover) !important;
            text-decoration: underline !important;
        }

        .signup-section {
            border-top: 1px solid var(--border);
            margin-top: 25px;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-icon">
        <i class="fas fa-bolt"></i>
    </div>
    
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark mb-1">Welcome Back</h3>
        <p class="text-muted small">Log in to your CRM dashboard</p>
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@company.com" required>
        </div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0">Password</label>
                <a href="#" class="text-primary small text-decoration-none forgot-link">Forgot Password?</a>
            </div>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 shadow-sm">
            Sign In <i class="fas fa-arrow-right ms-2 small"></i>
        </button>
    </form>

    <div class="signup-section text-center">
        <p class="small text-muted mb-0">
            Don't have an account? <a href="/signup" class="text-primary fw-bold text-decoration-none">Create Account</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
